site_name: Guida a Claude Code
site_description: Da zero a produttivo — verificato luglio 2026, v2.1.210
copyright: '© 2026 Me-xico · <a href="https://creativecommons.org/licenses/by/4.0/">CC BY 4.0</a>'
docs_dir: guida-claude-code
site_dir: guida-claude-code-sito
use_directory_urls: false

theme:
  name: material
  language: it
  font: false
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      toggle:
        icon: material/weather-sunny
        name: Tema chiaro
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      toggle:
        icon: material/weather-night
        name: Tema scuro
  features:
    - navigation.footer
    - navigation.top
    - content.code.copy
    - search.suggest

nav:
  - Home: README.md
  - Base:
      - 01 · Installazione: 01-installazione.md
      - 02 · Setup e configurazione: 02-setup-e-config.md
      - 03 · Uso quotidiano: 03-uso-quotidiano.md
      - 04 · CLAUDE.md e rules: 04-claude-md-e-rules.md
  - Metodo:
      - 11 · Verifica: 11-verifica.md
      - 12 · Prompt engineering: 12-prompt-engineering.md
      - 13 · Errori comuni: 13-errori-comuni.md
      - 17 · Ricerca e progettazione: 17-ricerca-e-progettazione.md
  - Potenza:
      - 05 · Skill e slash command: 05-skills-e-slash-commands.md
      - 06 · Agenti: 06-agenti.md
      - 07 · Hook: 07-hooks.md
      - 08 · MCP: 08-mcp.md
      - 09 · Plugin: 09-plugins.md
      - 10 · Workflow frontend: 10-workflow-frontend.md
  - Riferimento:
      - 14 · Must-have e costi: 14-must-have-e-costi.md
      - 15 · Risparmiare token: 15-risparmiare-token.md
      - 16 · Un setup reale: 16-setup-a-tre-livelli.md

plugins:
  - search
  - offline
  - i18n:
      docs_structure: suffix
      languages:
        - locale: it
          default: true
          name: Italiano
          build: true
        - locale: en
          name: English
          build: true
          nav_translations:
            Base: Basics
            Metodo: Method
            Potenza: Power
            Riferimento: Reference
            01 · Installazione: 01 · Installation
            02 · Setup e configurazione: 02 · Setup and configuration
            03 · Uso quotidiano: 03 · Daily use
            04 · CLAUDE.md e rules: 04 · CLAUDE.md and rules
            11 · Verifica: 11 · Verification
            12 · Prompt engineering: 12 · Prompt engineering
            13 · Errori comuni: 13 · Common mistakes
            17 · Ricerca e progettazione: 17 · Research and design
            05 · Skill e slash command: 05 · Skills and slash commands
            06 · Agenti: 06 · Agents
            07 · Hook: 07 · Hooks
            08 · MCP: 08 · MCP
            09 · Plugin: 09 · Plugins
            10 · Workflow frontend: 10 · Frontend workflow
            14 · Must-have e costi: 14 · Must-haves and costs
            15 · Risparmiare token: 15 · Saving tokens
            16 · Un setup reale: 16 · A real-world setup

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

exclude_docs: |
  slides.html
  build-slides.py
  SANITIZE.md
