<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8A8FA3"/>
    </marker>
  </defs>

  <!-- ═══ Legenda ═══ -->
  <g font-size="12">
    <rect x="230" y="14" width="14" height="14" rx="3" fill="#6D5BD0"/>
    <text x="250" y="26" fill="#8A8FA3">condiviso sempre</text>
    <rect x="430" y="14" width="14" height="14" rx="3" fill="#2E86AB"/>
    <text x="450" y="26" fill="#8A8FA3">stato per attività</text>
    <rect x="630" y="14" width="14" height="14" rx="3" fill="#4F9153"/>
    <text x="650" y="26" fill="#8A8FA3">specifico del repo</text>
  </g>

  <!-- ═══ Strato REPO (alto, verde, più stretto) ═══ -->
  <rect x="190" y="70" width="300" height="110" rx="10" fill="#4F9153"/>
  <text x="340" y="100" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="700">REPO — &lt;progetto&gt;/.claude/</text>
  <text x="340" y="122" text-anchor="middle" fill="#DDEEDD" font-size="11.5">agenti di progetto ·</text>
  <text x="340" y="138" text-anchor="middle" fill="#DDEEDD" font-size="11.5">hook di progetto ·</text>
  <text x="340" y="154" text-anchor="middle" fill="#DDEEDD" font-size="11.5">CLAUDE.md del repo</text>

  <!-- ═══ Strato PROFILO / ATTIVITÀ (medio, blu) ═══ -->
  <rect x="110" y="200" width="460" height="110" rx="10" fill="#2E86AB"/>
  <text x="340" y="232" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700">PROFILO / ATTIVITÀ — ~/.cloak/profiles/&lt;attività&gt;/</text>
  <text x="340" y="256" text-anchor="middle" fill="#D9EDF7" font-size="11.5">credenziali · MCP auth · memoria per progetto · sessioni</text>

  <!-- ═══ Strato GLOBALE (basso, viola, più largo) ═══ -->
  <rect x="30" y="330" width="620" height="110" rx="10" fill="#6D5BD0"/>
  <text x="340" y="366" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="700">GLOBALE — ~/.claude/</text>
  <text x="340" y="390" text-anchor="middle" fill="#E8E4FA" font-size="12">CLAUDE.md · settings (permessi+hook) · agents · skills · workflows</text>

  <!-- ═══ Freccia symlink: dal basso (Globale) verso il medio (Profilo) ═══ -->
  <line x1="710" y1="385" x2="710" y2="255" stroke="#8A8FA3" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arr)"/>
  <text x="694" y="320" fill="#8A8FA3" font-size="12" text-anchor="middle" transform="rotate(-90 694 320)">symlink: ciò che vale ovunque</text>

  <!-- ═══ Freccia override: dall'alto (Repo) verso il basso (Globale) ═══ -->
  <line x1="820" y1="125" x2="820" y2="385" stroke="#8A8FA3" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arr)"/>
  <text x="836" y="255" fill="#8A8FA3" font-size="12" text-anchor="middle" transform="rotate(-90 836 255)">override: il livello più basso vince</text>
</svg>
