<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8A8FA3"/>
    </marker>
  </defs>

  <!-- ═══ Claude riconosce da solo ═══ -->
  <rect x="20" y="68" width="150" height="52" rx="10" fill="#2E86AB"/>
  <text x="95" y="100" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="600">Claude</text>
  <path d="M 170 100 L 258 108" fill="none" stroke="#8A8FA3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="214" y="64" text-anchor="middle" fill="#8A8FA3" font-size="11">la sessione riconosce il caso</text>
  <text x="214" y="78" text-anchor="middle" fill="#8A8FA3" font-size="11">nella description → invoca da sola</text>

  <!-- ═══ utente forza l'invocazione ═══ -->
  <rect x="20" y="282" width="150" height="52" rx="10" fill="#41465A"/>
  <text x="95" y="314" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="600">utente</text>
  <path d="M 170 308 L 258 296" fill="none" stroke="#8A8FA3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="214" y="352" text-anchor="middle" fill="#8A8FA3" font-size="11">/nome-skill →</text>
  <text x="214" y="366" text-anchor="middle" fill="#8A8FA3" font-size="11">invocazione forzata</text>

  <!-- ═══ SKILL.md tab ═══ -->
  <rect x="260" y="38" width="110" height="22" rx="6" fill="#B0763B"/>
  <text x="315" y="53" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="700">SKILL.md</text>

  <!-- ═══ frontmatter ═══ -->
  <rect x="260" y="64" width="400" height="138" rx="10" fill="#B0763B"/>
  <text x="460" y="94" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700">frontmatter</text>
  <text x="460" y="116" text-anchor="middle" fill="#F7E8D5" font-size="11.5">name + description</text>
  <text x="460" y="134" text-anchor="middle" fill="#F7E8D5" font-size="11.5">il GRILLETTO: trigger espliciti e non-casi</text>

  <!-- ═══ corpo ═══ -->
  <rect x="260" y="210" width="400" height="138" rx="10" fill="none" stroke="#B0763B" stroke-width="2"/>
  <text x="460" y="240" text-anchor="middle" fill="#B0763B" font-size="14" font-weight="700">corpo</text>
  <text x="460" y="262" text-anchor="middle" fill="#B0763B" font-size="11.5">la procedura: passi, comandi,</text>
  <text x="460" y="278" text-anchor="middle" fill="#B0763B" font-size="11.5">agenti da lanciare</text>
  <text x="460" y="298" text-anchor="middle" fill="#B0763B" font-size="11" font-weight="600">(caricato solo all'invocazione)</text>

  <!-- ═══ la skill orchestra ═══ -->
  <text x="812" y="70" text-anchor="middle" fill="#8A8FA3" font-size="12.5">la skill orchestra: agenti, comandi, altri tool</text>

  <path d="M 665 206 C 700 206 700 117 712 117" fill="none" stroke="#8A8FA3" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 665 206 L 712 206" fill="none" stroke="#8A8FA3" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 665 206 C 700 206 700 293 712 293" fill="none" stroke="#8A8FA3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="712" y="90" width="200" height="54" rx="9" fill="#2E86AB"/>
  <text x="812" y="122" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="600">agente</text>

  <rect x="712" y="178" width="200" height="54" rx="9" fill="#4F9153"/>
  <text x="812" y="210" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="600">comando</text>

  <rect x="712" y="266" width="200" height="54" rx="9" fill="#B0763B"/>
  <text x="812" y="298" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="600">tool</text>

  <!-- ═══ nota ═══ -->
  <text x="480" y="400" text-anchor="middle" fill="#8A8FA3" font-size="13">una skill è un orchestratore scritto: se un'orchestrazione ti riesce due volte a mano,</text>
  <text x="480" y="418" text-anchor="middle" fill="#8A8FA3" font-size="13">la terza scrivila.</text>
</svg>
