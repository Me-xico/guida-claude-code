<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8A8FA3"/>
    </marker>
  </defs>

  <!-- ═══ 1. il modello propone ═══ -->
  <g id="p-propone">
    <rect x="10" y="140" width="170" height="120" rx="10" fill="#2E86AB"/>
    <text x="95" y="180" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="700">il modello propone</text>
    <text x="95" y="200" text-anchor="middle" fill="#D9EDF7" font-size="11">un tool call</text>
    <text x="95" y="216" text-anchor="middle" fill="#D9EDF7" font-size="11">(es. Bash)</text>

    <path d="M 180 200 L 205 200" fill="none" stroke="#8A8FA3" stroke-width="2" marker-end="url(#arr)"/>
  </g>

  <!-- ═══ 2. PreToolUse ═══ -->
  <g id="p-pre">
    <rect x="205" y="140" width="220" height="120" rx="10" fill="#B0763B"/>
    <text x="315" y="172" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700">PreToolUse</text>
    <text x="315" y="194" text-anchor="middle" fill="#F7E8D5" font-size="11">può BLOCCARE (exit 2,</text>
    <text x="315" y="210" text-anchor="middle" fill="#F7E8D5" font-size="11">lo stderr torna al modello)</text>
    <text x="315" y="226" text-anchor="middle" fill="#F7E8D5" font-size="11">o riscrivere l'input</text>

    <path d="M 425 200 L 450 200" fill="none" stroke="#8A8FA3" stroke-width="2" marker-end="url(#arr)"/>
  </g>

  <!-- ═══ 3. il tool esegue ═══ -->
  <g id="p-tool">
    <rect x="450" y="140" width="130" height="120" rx="10" fill="#41465A"/>
    <text x="515" y="196" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700">il tool</text>
    <text x="515" y="214" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700">esegue</text>

    <path d="M 580 200 L 605 200" fill="none" stroke="#8A8FA3" stroke-width="2" marker-end="url(#arr)"/>
  </g>

  <!-- ═══ 4. PostToolUse ═══ -->
  <g id="p-post">
    <rect x="605" y="140" width="220" height="120" rx="10" fill="#B0763B"/>
    <text x="715" y="172" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700">PostToolUse</text>
    <text x="715" y="196" text-anchor="middle" fill="#F7E8D5" font-size="11">può correggere e segnalare</text>
    <text x="715" y="212" text-anchor="middle" fill="#F7E8D5" font-size="11">(es. ruff dopo un edit)</text>

    <path d="M 825 200 L 850 200" fill="none" stroke="#8A8FA3" stroke-width="2" marker-end="url(#arr)"/>
  </g>

  <!-- ═══ 5. risposta ═══ -->
  <g id="p-risposta">
    <rect x="850" y="140" width="100" height="120" rx="10" fill="#4F9153"/>
    <text x="900" y="204" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="700">risposta</text>
  </g>

  <!-- ═══ ciclo di blocco ═══ -->
  <g id="p-loop">
    <path d="M 310 260 C 310 320 95 320 95 260" fill="none" stroke="#8A8FA3" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arr)"/>
    <text x="202" y="340" text-anchor="middle" fill="#8A8FA3" font-size="12">bloccato: il modello legge il motivo e si corregge</text>
  </g>

  <!-- ═══ nota ═══ -->
  <g id="p-nota">
    <text x="480" y="420" text-anchor="middle" fill="#8A8FA3" font-size="13">la prosa nel CLAUDE.md spiega l'intento; l'hook lo garantisce</text>
  </g>
</svg>
