<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 730" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr13" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8A8FA3"/>
    </marker>
  </defs>

  <text x="20" y="32" fill="#8A8FA3" font-size="18" font-weight="700">Otto errori: il sintomo, la cura</text>

  <!-- legenda -->
  <g font-size="12.5">
    <rect x="770" y="18" width="14" height="14" rx="3" fill="#B0763B"/>
    <text x="790" y="30" fill="#8A8FA3">= la cura</text>
  </g>

  <!-- riga 1 -->
  <circle cx="36" cy="107" r="18" fill="none" stroke="#8A8FA3" stroke-width="2"/>
  <text x="36" y="112" text-anchor="middle" fill="#8A8FA3" font-size="15" font-weight="700">1</text>
  <text x="68" y="98" fill="#8A8FA3" font-size="14.5" font-weight="700">Usarlo come ChatGPT</text>
  <text x="68" y="120" fill="#8A8FA3" font-size="11.5"><tspan font-weight="700">Sintomo: </tspan>domande secche, zero contesto, "non capisce niente"</text>
  <line x1="560" y1="107" x2="600" y2="107" stroke="#8A8FA3" stroke-width="2" marker-end="url(#arr13)"/>
  <rect x="610" y="70" width="330" height="74" rx="10" fill="#B0763B"/>
  <text x="626" y="96" fill="#FFFFFF" font-size="12" font-weight="700">Cura</text>
  <text x="626" y="118" fill="#F7E8D5" font-size="11.5">dagli file, comandi da eseguire, criteri</text>

  <!-- riga 2 -->
  <circle cx="36" cy="187" r="18" fill="none" stroke="#8A8FA3" stroke-width="2"/>
  <text x="36" y="192" text-anchor="middle" fill="#8A8FA3" font-size="15" font-weight="700">2</text>
  <text x="68" y="178" fill="#8A8FA3" font-size="14.5" font-weight="700">Il greed mistake</text>
  <text x="68" y="200" fill="#8A8FA3" font-size="11.5"><tspan font-weight="700">Sintomo: </tspan>"e poi... e anche... e già che ci sei..."</text>
  <line x1="560" y1="187" x2="600" y2="187" stroke="#8A8FA3" stroke-width="2" marker-end="url(#arr13)"/>
  <rect x="610" y="150" width="330" height="74" rx="10" fill="#B0763B"/>
  <text x="626" y="176" fill="#FFFFFF" font-size="12" font-weight="700">Cura</text>
  <text x="626" y="198" fill="#F7E8D5" font-size="11.5">un obiettivo per prompt, verificato prima</text>

  <!-- riga 3 -->
  <circle cx="36" cy="267" r="18" fill="none" stroke="#8A8FA3" stroke-width="2"/>
  <text x="36" y="272" text-anchor="middle" fill="#8A8FA3" font-size="15" font-weight="700">3</text>
  <text x="68" y="258" fill="#8A8FA3" font-size="14.5" font-weight="700">Correggere in loop</text>
  <text x="68" y="280" fill="#8A8FA3" font-size="11.5"><tspan font-weight="700">Sintomo: </tspan>quinto tentativo, ogni volta peggio</text>
  <line x1="560" y1="267" x2="600" y2="267" stroke="#8A8FA3" stroke-width="2" marker-end="url(#arr13)"/>
  <rect x="610" y="230" width="330" height="74" rx="10" fill="#B0763B"/>
  <text x="626" y="256" fill="#FFFFFF" font-size="12" font-weight="700">Cura</text>
  <text x="626" y="278" fill="#F7E8D5" font-size="11.5">2 tentativi falliti → /clear → riparti</text>

  <!-- riga 4 -->
  <circle cx="36" cy="347" r="18" fill="none" stroke="#8A8FA3" stroke-width="2"/>
  <text x="36" y="352" text-anchor="middle" fill="#8A8FA3" font-size="15" font-weight="700">4</text>
  <text x="68" y="338" fill="#8A8FA3" font-size="14.5" font-weight="700">Il CLAUDE.md enciclopedia</text>
  <text x="68" y="360" fill="#8A8FA3" font-size="11.5"><tspan font-weight="700">Sintomo: </tspan>600 righe, Claude ignora quella che conta</text>
  <line x1="560" y1="347" x2="600" y2="347" stroke="#8A8FA3" stroke-width="2" marker-end="url(#arr13)"/>
  <rect x="610" y="310" width="330" height="74" rx="10" fill="#B0763B"/>
  <text x="626" y="336" fill="#FFFFFF" font-size="12" font-weight="700">Cura</text>
  <text x="626" y="358" fill="#F7E8D5" font-size="11.5">test della riga: ~200 righe massimo</text>

  <!-- riga 5 -->
  <circle cx="36" cy="427" r="18" fill="none" stroke="#8A8FA3" stroke-width="2"/>
  <text x="36" y="432" text-anchor="middle" fill="#8A8FA3" font-size="15" font-weight="700">5</text>
  <text x="68" y="418" fill="#8A8FA3" font-size="14.5" font-weight="700">Fidarsi senza verificare</text>
  <text x="68" y="440" fill="#8A8FA3" font-size="11.5"><tspan font-weight="700">Sintomo: </tspan>"ha detto che funziona" → rollback alle 18:30</text>
  <line x1="560" y1="427" x2="600" y2="427" stroke="#8A8FA3" stroke-width="2" marker-end="url(#arr13)"/>
  <rect x="610" y="390" width="330" height="74" rx="10" fill="#B0763B"/>
  <text x="626" y="416" fill="#FFFFFF" font-size="12" font-weight="700">Cura</text>
  <text x="626" y="438" fill="#F7E8D5" font-size="11.5">"mostrami l'output dei test", sempre</text>

  <!-- riga 6 -->
  <circle cx="36" cy="507" r="18" fill="none" stroke="#8A8FA3" stroke-width="2"/>
  <text x="36" y="512" text-anchor="middle" fill="#8A8FA3" font-size="15" font-weight="700">6</text>
  <text x="68" y="498" fill="#8A8FA3" font-size="14.5" font-weight="700">Non revisionare tra un prompt e l'altro</text>
  <text x="68" y="520" fill="#8A8FA3" font-size="11.5"><tspan font-weight="700">Sintomo: </tspan>tre feature sopra una prima sbagliata</text>
  <line x1="560" y1="507" x2="600" y2="507" stroke="#8A8FA3" stroke-width="2" marker-end="url(#arr13)"/>
  <rect x="610" y="470" width="330" height="74" rx="10" fill="#B0763B"/>
  <text x="626" y="496" fill="#FFFFFF" font-size="12" font-weight="700">Cura</text>
  <text x="626" y="518" fill="#F7E8D5" font-size="11.5">rivedi ogni blocco prima di continuare</text>

  <!-- riga 7 -->
  <circle cx="36" cy="587" r="18" fill="none" stroke="#8A8FA3" stroke-width="2"/>
  <text x="36" y="592" text-anchor="middle" fill="#8A8FA3" font-size="15" font-weight="700">7</text>
  <text x="68" y="578" fill="#8A8FA3" font-size="14.5" font-weight="700">Investigazioni senza scope</text>
  <text x="68" y="600" fill="#8A8FA3" font-size="11.5"><tspan font-weight="700">Sintomo: </tspan>contesto pieno di file letti a caso</text>
  <line x1="560" y1="587" x2="600" y2="587" stroke="#8A8FA3" stroke-width="2" marker-end="url(#arr13)"/>
  <rect x="610" y="550" width="330" height="74" rx="10" fill="#B0763B"/>
  <text x="626" y="576" fill="#FFFFFF" font-size="12" font-weight="700">Cura</text>
  <text x="626" y="598" fill="#F7E8D5" font-size="11.5">scope esplicito, o subagent Explore</text>

  <!-- riga 8 -->
  <circle cx="36" cy="667" r="18" fill="none" stroke="#8A8FA3" stroke-width="2"/>
  <text x="36" y="672" text-anchor="middle" fill="#8A8FA3" font-size="15" font-weight="700">8</text>
  <text x="68" y="658" fill="#8A8FA3" font-size="14.5" font-weight="700">La kitchen-sink session</text>
  <text x="68" y="680" fill="#8A8FA3" font-size="11.5"><tspan font-weight="700">Sintomo: </tspan>bugfix + architettura + refactor, stessa sessione</text>
  <line x1="560" y1="667" x2="600" y2="667" stroke="#8A8FA3" stroke-width="2" marker-end="url(#arr13)"/>
  <rect x="610" y="630" width="330" height="74" rx="10" fill="#B0763B"/>
  <text x="626" y="656" fill="#FFFFFF" font-size="12" font-weight="700">Cura</text>
  <text x="626" y="678" fill="#F7E8D5" font-size="11.5">/clear tra task diversi, sempre</text>
</svg>
