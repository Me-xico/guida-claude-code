<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8A8FA3"/>
    </marker>
  </defs>

  <!-- ═══ Legenda modelli ═══ -->
  <g font-size="13">
    <rect x="632" y="18" width="14" height="14" rx="3" fill="#6D5BD0"/>
    <text x="652" y="30" fill="#8A8FA3">Fable 5</text>
    <rect x="722" y="18" width="14" height="14" rx="3" fill="#2E86AB"/>
    <text x="742" y="30" fill="#8A8FA3">Sonnet</text>
    <rect x="808" y="18" width="14" height="14" rx="3" fill="#4F9153"/>
    <text x="828" y="30" fill="#8A8FA3">Haiku</text>
    <rect x="878" y="18" width="14" height="14" rx="3" fill="#B0763B"/>
    <text x="898" y="30" fill="#8A8FA3">Skill</text>
  </g>

  <!-- ═══ Livello 0: Utente ═══ -->
  <rect x="380" y="20" width="200" height="44" rx="10" fill="#41465A"/>
  <text x="480" y="47" text-anchor="middle" fill="#FFFFFF" font-size="16" font-weight="600">Utente</text>
  <line x1="480" y1="64" x2="480" y2="92" stroke="#8A8FA3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══ Livello 1: Orchestratore ═══ -->
  <rect x="150" y="96" width="660" height="86" rx="12" fill="#6D5BD0"/>
  <text x="480" y="126" text-anchor="middle" fill="#FFFFFF" font-size="17" font-weight="700">Orchestratore — sessione principale (Fable 5, contesto 1M)</text>
  <text x="480" y="150" text-anchor="middle" fill="#E8E4FA" font-size="13">regole CLAUDE.md · decide la delega · sintetizza i verdetti · applica le modifiche</text>
  <text x="480" y="170" text-anchor="middle" fill="#CFC7F5" font-size="12">guard-rail deterministici (hook): rtk · block-ai-commit · uv-enforce · ruff-after-edit</text>

  <!-- frecce verso le tre bande -->
  <line x1="480" y1="182" x2="480" y2="214" stroke="#8A8FA3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══ Livello 2: DECIDERE (advisory) ═══ -->
  <text x="30" y="248" fill="#8A8FA3" font-size="13" font-weight="700" transform="rotate(-90 30 248)" text-anchor="end"></text>
  <rect x="60" y="218" width="840" height="130" rx="12" fill="none" stroke="#8A8FA3" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="78" y="240" fill="#8A8FA3" font-size="13" font-weight="700" letter-spacing="1">DECIDERE — consulenza, per altitudine</text>

  <rect x="80" y="254" width="190" height="74" rx="9" fill="#6D5BD0"/>
  <text x="175" y="280" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="600">architect</text>
  <text x="175" y="300" text-anchor="middle" fill="#E8E4FA" font-size="11.5">sistema: confini, stack,</text>
  <text x="175" y="315" text-anchor="middle" fill="#E8E4FA" font-size="11.5">scelte costose da invertire</text>

  <rect x="288" y="254" width="190" height="74" rx="9" fill="#6D5BD0"/>
  <text x="383" y="280" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="600">design-reviewer</text>
  <text x="383" y="300" text-anchor="middle" fill="#E8E4FA" font-size="11.5">modulo: contratti, errori,</text>
  <text x="383" y="315" text-anchor="middle" fill="#E8E4FA" font-size="11.5">concorrenza, "come lo scrivo?"</text>

  <rect x="496" y="254" width="190" height="74" rx="9" fill="#B0763B"/>
  <text x="591" y="276" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="600">/design</text>
  <text x="591" y="294" text-anchor="middle" fill="#F7E8D5" font-size="11.5">decisione contesa → 4 lenti</text>
  <text x="591" y="309" text-anchor="middle" fill="#F7E8D5" font-size="11.5">parallele su Sonnet + sintesi</text>
  <text x="591" y="323" text-anchor="middle" fill="#F7E8D5" font-size="10.5">YAGNI · failure · security · evoluzione</text>

  <rect x="704" y="254" width="176" height="74" rx="9" fill="#B0763B"/>
  <text x="792" y="280" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="600">/llm-council</text>
  <text x="792" y="300" text-anchor="middle" fill="#F7E8D5" font-size="11.5">business e strategia:</text>
  <text x="792" y="315" text-anchor="middle" fill="#F7E8D5" font-size="11.5">panel multi-modello</text>

  <line x1="480" y1="348" x2="480" y2="378" stroke="#8A8FA3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══ Livello 3: FARE (worker) ═══ -->
  <rect x="60" y="382" width="840" height="130" rx="12" fill="none" stroke="#8A8FA3" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="78" y="404" fill="#8A8FA3" font-size="13" font-weight="700" letter-spacing="1">FARE — worker specializzati</text>

  <rect x="80" y="418" width="255" height="74" rx="9" fill="#2E86AB"/>
  <text x="207" y="442" text-anchor="middle" fill="#FFFFFF" font-size="13.5" font-weight="600">language expert</text>
  <text x="207" y="461" text-anchor="middle" fill="#D9EDF7" font-size="11.5">python · web-fullstack</text>
  <text x="207" y="477" text-anchor="middle" fill="#D9EDF7" font-size="11.5">terraform · cdk-python</text>

  <rect x="352" y="418" width="255" height="74" rx="9" fill="#2E86AB"/>
  <text x="479" y="442" text-anchor="middle" fill="#FFFFFF" font-size="13.5" font-weight="600">esperti di dominio</text>
  <text x="479" y="461" text-anchor="middle" fill="#D9EDF7" font-size="11.5">data-engineer · data-scientist · data-analyst</text>
  <text x="479" y="477" text-anchor="middle" fill="#D9EDF7" font-size="11.5">cloud-ml-ai-engineer · devops-hosting</text>

  <rect x="624" y="418" width="256" height="74" rx="9" fill="#2E86AB"/>
  <text x="752" y="442" text-anchor="middle" fill="#FFFFFF" font-size="13.5" font-weight="600">testi e traduzione</text>
  <text x="752" y="461" text-anchor="middle" fill="#D9EDF7" font-size="11.5">semantica-it · semantica-en</text>
  <text x="752" y="477" text-anchor="middle" fill="#D9EDF7" font-size="11.5">traduttore-it-en · Explore (ricerca)</text>

  <line x1="480" y1="512" x2="480" y2="542" stroke="#8A8FA3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ═══ Livello 4: VERIFICARE ═══ -->
  <rect x="60" y="546" width="840" height="128" rx="12" fill="none" stroke="#8A8FA3" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="78" y="568" fill="#8A8FA3" font-size="13" font-weight="700" letter-spacing="1">VERIFICARE — processo e qualità</text>

  <rect x="80" y="582" width="190" height="72" rx="9" fill="#2E86AB"/>
  <text x="175" y="608" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="600">debugger</text>
  <text x="175" y="628" text-anchor="middle" fill="#D9EDF7" font-size="11.5">riproduce → isola →</text>
  <text x="175" y="643" text-anchor="middle" fill="#D9EDF7" font-size="11.5">root cause → propone fix</text>

  <rect x="288" y="582" width="190" height="72" rx="9" fill="#4F9153"/>
  <text x="383" y="608" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="600">test-runner</text>
  <text x="383" y="628" text-anchor="middle" fill="#DDEEDD" font-size="11.5">suite rumorose in contesto</text>
  <text x="383" y="643" text-anchor="middle" fill="#DDEEDD" font-size="11.5">separato → solo il verdetto</text>

  <rect x="496" y="582" width="190" height="72" rx="9" fill="#6D5BD0"/>
  <text x="591" y="608" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="600">delivery-red-team</text>
  <text x="591" y="628" text-anchor="middle" fill="#E8E4FA" font-size="11.5">validazione adversariale</text>
  <text x="591" y="643" text-anchor="middle" fill="#E8E4FA" font-size="11.5">prima della consegna</text>

  <rect x="704" y="582" width="176" height="72" rx="9" fill="#B0763B"/>
  <text x="792" y="608" text-anchor="middle" fill="#FFFFFF" font-size="14" font-weight="600">workflow</text>
  <text x="792" y="628" text-anchor="middle" fill="#F7E8D5" font-size="11.5">deep-research: fan-out +</text>
  <text x="792" y="643" text-anchor="middle" fill="#F7E8D5" font-size="11.5">verifica a 3 voti (Sonnet)</text>

  <!-- freccia di ritorno all'orchestratore -->
  <path d="M 900 610 C 946 610 946 139 814 139" fill="none" stroke="#8A8FA3" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arr)"/>
  <text x="936" y="380" fill="#8A8FA3" font-size="12" transform="rotate(-90 936 380)" text-anchor="middle">verdetti e report → sintesi</text>
</svg>
